<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN | CODE SEVEN ACADEMY</title>
    <link rel="stylesheet" href="./src/css/register.css">
    <script src="./src/js/script.js" defer type="module"></script>
</head>
<body>
    <div id="main-container">
        <div id="banner-login">
            <div class="filter">
                <div id="logo-code-seven">
                    <img src="./src/img/simpleLogoWhite.png" alt="Logotipo da Empresa Code Seven Academy">
                </div>
                <h3>Cadastre-se para acompanhar nossos eventos e fazer sua inscrição no CFI "Curso de Formação de Instrutor"</h3>
            </div>
        </div>
        <div id="form-login">
            <form id="form-sign-up">
                <h2>Sign Up</h2>
                <label for="sign-up-matricula-candidate">Matricula</label>
                <input class="text-input-default" type="text" placeholder="Ex: 001234" id="sign-up-matricula-candidate">
                <label for="sign-up-name-candidate">Nome Completo</label>
                <input class="text-input-default" type="text" placeholder="Ex: José da Costa Filho" id="sign-up-name-candidate">
                <label for="sign-up-email-candidate">E-mail</label>
                <input class="text-input-default" type="email" placeholder="Ex: primeironome@email.com" id="sign-up-email-candidate">
                <label for="sign-up-telephone-candidate">Celular de Candidato</label>
                <input class="text-input-default" type="text" placeholder="(xx) 99999-0000" id="sign-up-telephone-candidate">
                <label for="sign-up-name-responsible">Nome do Responsável</label>
                <input class="text-input-default" type="text" placeholder="Ex: José da Costa Filho" id="sign-up-name-responsible">
                <label for="sign-up-telephone-responsible">Celular do Responsável</label>
                <input class="text-input-default" type="text" placeholder="(xx) 99999-0000" id="sign-up-telephone-responsible">
                <button id="btn-sign-up" class="btn-sign">Sign Up</button>
            </form>
        </div>
    </div>
</body>
</html>
